<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माझा पोर्टफोलिओ | Edulizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Profile Specific Modern CSS */
        .profile-wrapper { display: grid; grid-template-columns: 300px 1fr; gap: 25px; align-items: start; }
        .profile-sidebar { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .avatar-circle { width: 100px; height: 100px; background: var(--primary); color: white; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto 15px; border: 4px solid #eef2ff; }
        .info-card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .stat-box { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .stat-box label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-box p { font-size: 1.1rem; font-weight: 700; color: #1e293b; margin: 0; }
        
        /* डेस्कटॉपवर साईडबार नीट दिसण्यासाठी */
        @media (min-width: 769px) {
            .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; }
            .sidebar { position: sticky; top: 70px; height: calc(100vh - 70px); }
        }

        @media (max-width: 900px) { 
            .profile-wrapper { grid-template-columns: 1fr; } 
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <i class="fas fa-bars" id="menu-btn"></i>
            <div class="logo"><i class="fas fa-bolt"></i> Edulizer</div>
        </div>
        <div class="nav-right">
            <div class="user-info-nav">
                <small>Logged in as</small>
                <span id="navUserName">विद्यार्थी</span>
            </div>
            <button onclick="logout()" class="btn-logout-red">Logout</button>
        </div>
    </nav>

    <div class="dashboard-layout">
        
        <div class="sidebar">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> होम</a>
            <a href="college-list.html" class="nav-item"><i class="fas fa-university"></i> कॉलेज लिस्ट</a>
            <a href="profile.html" class="nav-item active"><i class="fas fa-user-circle"></i> प्रोफाइल</a>
            <a href="javascript:void(0)" onclick="logout()" class="nav-item logout-item"><i class="fas fa-sign-out-alt"></i> लॉगआउट</a>
        </div>

        <div class="main-panel">
            <div style="max-width: 1100px; margin: 0 auto; padding: 10px;">
                
                <a href="dashboard.html" style="text-decoration: none; color: var(--primary); font-weight: 700; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; background: #eef2ff; padding: 10px 15px; border-radius: 10px;">
                    <i class="fas fa-arrow-left"></i> डॅशबोर्डवर परत जा
                </a>

                <div class="profile-wrapper">
                    <div class="profile-sidebar">
                        <div class="avatar-circle" id="userInitial">V</div>
                        <h2 id="displayFullname">विद्यार्थी</h2>
                        <p id="displayEmail">email@example.com</p>
                        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                        <div style="text-align: left;">
                            <div class="stat-box" style="margin-bottom: 10px;">
                                <label>कॅटेगरी</label>
                                <p id="statCat">Open</p>
                            </div>
                            <div class="stat-box">
                                <label>SML रँक</label>
                                <p id="statRank">Not Set</p>
                            </div>
                        </div>
                    </div>

                    <div class="profile-content">
                        <form id="profileForm">
                            <div class="info-card">
                                <h3><i class="fas fa-user-circle"></i> वैयक्तिक तपशील</h3>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>पूर्ण नाव</label>
                                        <input type="text" id="profName" required>
                                    </div>
                                    <div class="form-group">
                                        <label>मोबाईल नंबर</label>
                                        <input type="tel" id="profPhone">
                                    </div>
                                </div>
                            </div>

                            <div class="info-card">
                                <h3><i class="fas fa-graduation-cap"></i> शैक्षणिक माहिती</h3>
                                <div class="grid-2">
                                    <div class="form-group">
                                        <label>१० वी टक्के (%)</label>
                                        <input type="number" step="0.01" id="prof10th">
                                    </div>
                                    <div class="form-group">
                                        <label>१२ वी टक्के (%)</label>
                                        <input type="number" step="0.01" id="prof12th">
                                    </div>
                                    <div class="form-group">
                                        <label>MHT-CET Percentile</label>
                                        <input type="number" step="0.0001" id="profCET">
                                    </div>
                                    <div class="form-group">
                                        <label>JEE Main स्कोअर</label>
                                        <input type="number" step="0.0001" id="profJEE">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; border-radius: 12px;">
                                <i class="fas fa-check-circle"></i> प्रोफाइल अपडेट करा
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('currentUser')) || {};
            
            document.getElementById('profName').value = user.name || "";
            document.getElementById('displayFullname').innerText = user.name || "विद्यार्थी";
            document.getElementById('navUserName').innerText = user.name || "विद्यार्थी";
            document.getElementById('displayEmail').innerText = user.email || "";
            document.getElementById('userInitial').innerText = user.name ? user.name.charAt(0).toUpperCase() : "V";
            
            document.getElementById('profPhone').value = user.phone || "";
            document.getElementById('prof10th').value = user.ssc || "";
            document.getElementById('prof12th').value = user.hsc || "";
            document.getElementById('profCET').value = user.cet || "";
            document.getElementById('profJEE').value = user.jee || "";
            
            document.getElementById('statCat').innerText = user.category || "Open";
            document.getElementById('statRank').innerText = user.rank || "Not Set";

            // मोबाईल मेनू टोगल
            const menuBtn = document.getElementById('menu-btn');
            const sidebar = document.querySelector('.sidebar');
            if (menuBtn) {
                menuBtn.addEventListener('click', () => {
                    sidebar.classList.toggle('active');
                });
            }
        });

        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('currentUser'));
            user.name = document.getElementById('profName').value;
            user.phone = document.getElementById('profPhone').value;
            user.ssc = document.getElementById('prof10th').value;
            user.hsc = document.getElementById('prof12th').value;
            user.cet = document.getElementById('profCET').value;
            user.jee = document.getElementById('profJEE').value;

            localStorage.setItem('currentUser', JSON.stringify(user));
            alert('🔥 प्रोफाइल अपडेट झाली!');
            location.reload();
        });

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
