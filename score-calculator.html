<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Calculator | Edulizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .calc-container { max-width: 600px; margin: auto; }
        .upload-box { 
            border: 3px dashed #4f46e5; padding: 40px; text-align: center; 
            border-radius: 20px; background: white; cursor: pointer;
        }
        .loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .result-card { display: none; background: white; padding: 20px; border-radius: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        #status-msg { font-size: 0.8rem; color: #ef4444; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="upload-box" id="drop-zone" onclick="document.getElementById('pdfFile').click()">
        <i class="fas fa-file-pdf" style="font-size: 40px; color: #4f46e5;"></i>
        <h3>MHT-CET PDF अपलोड करा</h3>
        <p>क्लिक करा किंवा फाईल ओढून इथे टाका</p>
        <input type="file" id="pdfFile" accept=".pdf" style="display:none">
    </div>

    <div id="status-msg"></div>
    <div class="loader" id="loader"></div>

    <div class="result-card" id="resultArea">
        <h2 style="text-align: center; color: #4f46e5;">तुमचा स्कोअर</h2>
        <div class="score-row"><span>Physics:</span><b id="pScore">0</b></div>
        <div class="score-row"><span>Chemistry:</span><b id="cScore">0</b></div>
        <div class="score-row"><span>Mathematics:</span><b id="mScore">0</b></div>
        <div class="score-row" style="font-size: 1.2rem; color: #10b981; border: none; margin-top: 10px;">
            <span>Total:</span><b id="totalScore">0 / 200</b>
        </div>
    </div>
</div>

<script>
    // १. Worker Path सेट करणे (हे विसरल्यास PDF लोड होत नाही)
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('pdfFile');
    const status = document.getElementById('status-msg');

    fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "PDF वाचत आहे, कृपया थांबा...";
        document.getElementById('loader').style.display = "block";
        document.getElementById('resultArea').style.display = "none";

        const reader = new FileReader();
        reader.onload = async function() {
            try {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                let fullText = "";

                // सर्व पानांमधील मजकूर काढणे
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(s => s.str).join(" ");
                }

                console.log("Extracted Text Length:", fullText.length); // Debug साठी
                processCETData(fullText);

            } catch (err) {
                status.innerText = "Error: PDF वाचता आली नाही. कृपया खरी रिस्पॉन्स शीट वापरा.";
                console.error(err);
                document.getElementById('loader').style.display = "none";
            }
        };
        reader.readAsArrayBuffer(file);
    };

    function processCETData(text) {
        // CET च्या रिस्पॉन्स शीटमधील नेमका पॅटर्न शोधण्यासाठी सुधारित Regex
        // टीप: हे 'Correct Option' आणि 'Chosen Option' वर आधारित आहे
        const pRegex = /Physics.*?Correct Option\s*:\s*(\d+).*?Chosen Option\s*:\s*(\d+)/gis;
        const cRegex = /Chemistry.*?Correct Option\s*:\s*(\d+).*?Chosen Option\s*:\s*(\d+)/gis;
        const mRegex = /Mathematics.*?Correct Option\s*:\s*(\d+).*?Chosen Option\s*:\s*(\d+)/gis;

        let scores = { p: 0, c: 0, m: 0 };

        // Physics मोजणी
        let m;
        while ((m = pRegex.exec(text)) !== null) { if(m[1] === m[2]) scores.p++; }
        
        // Chemistry मोजणी
        while ((m = cRegex.exec(text)) !== null) { if(m[1] === m[2]) scores.c++; }

        // Maths मोजणी (प्रत्येक प्रश्नाला २ गुण)
        while ((m = mRegex.exec(text)) !== null) { if(m[1] === m[2]) scores.m += 2; }

        // रिझल्ट दाखवणे
        document.getElementById('pScore').innerText = scores.p;
        document.getElementById('cScore').innerText = scores.c;
        document.getElementById('mScore').innerText = scores.m;
        document.getElementById('totalScore').innerText = (scores.p + scores.c + scores.m) + " / 200";

        document.getElementById('loader').style.display = "none";
        document.getElementById('resultArea').style.display = "block";
        status.innerText = "यशस्वीरित्या स्कोअर मोजला गेला!";
    }
</script>

</body>
</html>
