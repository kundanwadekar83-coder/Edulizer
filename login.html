<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लॉगिन | Edulizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="logo" style="justify-content: center; margin-bottom: 30px;">
            <i class="fas fa-bolt"></i> Edulizer
        </div>
        
        <h2 style="text-align: center; margin-bottom: 10px; font-weight: 800;">परत स्वागत आहे!</h2>
        <p style="text-align: center; color: var(--secondary); margin-bottom: 30px; font-size: 0.9rem;">लॉगिन करा आणि प्रगती तपासा.</p>

        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> ईमेल</label>
                <input type="email" id="logEmail" placeholder="तुमचा ईमेल टाका" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-lock"></i> पासवर्ड</label>
                <input type="password" id="logPass" placeholder="पासवर्ड टाका" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1rem;">
                लॉगिन करा
            </button>
        </form>

        <p style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--secondary);">
            खाते नाही? <a href="register.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">नवीन नोंदणी करा</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
