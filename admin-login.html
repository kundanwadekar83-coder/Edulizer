<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Edulizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        .admin-icon {
            font-size: 3rem;
            color: #1e293b;
            margin-bottom: 20px;
        }
    </style>
</head>
<body style="background: #f1f5f9;">

    <div class="login-box">
        <div class="admin-icon">
            <i class="fas fa-user-lock"></i>
        </div>
        <h2>Admin Access</h2>
        <p style="color: var(--secondary); margin-bottom: 30px;">फक्त डेव्हलपर्ससाठी प्रवेश.</p>

        <div class="form-group" style="text-align: left;">
            <label>Admin ID</label>
            <input type="text" id="adminID" placeholder="उदा. dev_kundan">
        </div>

        <div class="form-group" style="text-align: left;">
            <label>Security Password</label>
            <input type="password" id="adminPass" placeholder="••••••••">
        </div>

        <button onclick="handleAdminLogin()" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
            Verify & Enter
        </button>
        
        <a href="index.html" style="display: block; margin-top: 20px; color: var(--secondary); text-decoration: none; font-size: 0.9rem;">
            <i class="fas fa-arrow-left"></i> वेबसाईटवर परत जा
        </a>
    </div>

    <script>
        function handleAdminLogin() {
            const id = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;

            // --- तुझा स्पेशल ID आणि Password इथे आहे ---
            const secretID = "admin_kundan";
            const secretPass = "Edulizer@2026";

            if (id === secretID && pass === secretPass) {
                // लॉगिन यशस्वी झाल्यावर ॲडमिन डॅशबोर्डवर पाठवा
                alert("प्रवेश यशस्वी! स्वागत आहे डेव्हलपर.");
                window.location.href = "admin.html";
            } else {
                alert("❌ चुकीचा ID किंवा पासवर्ड! प्रवेश नाकारला.");
            }
        }
    </script>
    <script>
    // १. सर्वात आधी ही सुरक्षा ओळ टाका (Uncomment करून)
    if (document.referrer.indexOf("admin-login.html") === -1) {
        alert("कृपया आधी लॉगिन करा!");
        window.location.href = "admin-login.html";
    }

    // २. यानंतर तुझे बाकीचे फंक्शन्स (checkAdmin, loadStats इ.) असतील
    function loadStats() {
        // ... तुझा जुना कोड
    }
    
    // ... बाकीचा सर्व कोड
    </script>
    
</body>
</html>
