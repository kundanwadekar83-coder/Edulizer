<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Edulizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Admin Page Specific Styling */
        .admin-lock-screen {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }
        .admin-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .stats-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-item {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <i class="fas fa-bars" id="menu-btn"></i> 
            <div class="logo">
                <i class="fas fa-user-shield"></i> Admin Panel
            </div>
        </div>
        <div class="nav-right">
            <a href="dashboard.html" class="btn-outline" style="text-decoration: none; font-size: 0.8rem;">Student Mode</a>
        </div>
    </nav>

    <div class="dashboard-layout">
        <div class="sidebar">
            <a href="#" class="nav-item active"><i class="fas fa-lock"></i> सुरक्षा</a>
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> डॅशबोर्ड</a>
        </div>

        <div class="main-panel">
            <div id="adminAuth" class="admin-lock-screen">
                <div class="admin-card">
                    <i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--primary); margin-bottom: 20px;"></i>
                    <h2 style="margin-bottom: 10px;">Control Room</h2>
                    <p style="color: var(--secondary); margin-bottom: 25px;">कृपया तुमचा गुप्त ॲक्सेस कोड टाका.</p>
                    <input type="password" id="adminPass" placeholder="Secret Code" style="margin-bottom: 20px; text-align: center;">
                    <button onclick="checkAdmin()" class="btn btn-primary" style="width: 100%;">प्रवेश करा</button>
                </div>
            </div>

            <div id="adminContent" style="display: none;">
                <h2 style="margin-bottom: 10px;">ॲप्लिकेशन डेटा ओव्हरव्ह्यू</h2>
                <p style="color: var(--secondary);">सिस्टीममधील सर्व डेटा येथे मॅनेज करा.</p>

                <div class="stats-box">
                    <div class="stat-item">
                        <p style="color: var(--secondary); font-size: 0.8rem;">एकूण कॉलेजेस</p>
                        <h2 id="colCount" style="font-size: 2rem;">0</h2>
                    </div>
                    <div class="stat-item" style="border-color: #10b981;">
                        <p style="color: var(--secondary); font-size: 0.8rem;">एकूण युजर्स (Storage)</p>
                        <h2 id="userCount" style="font-size: 2rem;">0</h2>
                    </div>
                </div>

                <div style="margin-top: 40px; background: #fff1f2; padding: 30px; border-radius: 20px; border: 1px solid #fecdd3;">
                    <h3 style="color: #e11d48; margin-bottom: 10px;"><i class="fas fa-triangle-exclamation"></i> Danger Zone</h3>
                    <p style="color: #be123c; margin-bottom: 20px;">येथून सर्व डेटा कायमचा डिलीट करता येतो. ही कृती परत घेता येणार नाही.</p>
                    <button onclick="clearAllData()" class="btn-logout-red" style="border-radius: 8px;">
                        <i class="fas fa-trash-can"></i> सर्व डेटा रिसेट करा
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "Edulizer@2026") {
                document.getElementById('adminAuth').style.display = "none";
                document.getElementById('adminContent').style.display = "block";
                loadStats();
            } else {
                alert("❌ चुकीचा पासवर्ड! पुन्हा प्रयत्न करा.");
            }
        }

        function loadStats() {
            const colleges = JSON.parse(localStorage.getItem('edulizer_colleges')) || [];
            document.getElementById('colCount').innerText = colleges.length;

            // युजर्स मोजण्यासाठी
            let userCount = 0;
            for (let i = 0; i < localStorage.length; i++) {
                if (localStorage.key(i).startsWith('user_')) userCount++;
            }
            document.getElementById('userCount').innerText = userCount;
        }

        function clearAllData() {
            if(confirm("सावधान! यामुळे सर्व युजर्स आणि कॉलेजेसची माहिती नष्ट होईल. खात्री आहे?")) {
                localStorage.clear();
                alert("✅ सर्व डेटा साफ करण्यात आला आहे!");
                location.reload();
            }
        }
    </script>
    <script src="js/college.js"></script> </body>
</html>
