<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Entry | Edulizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #4f46e5; 
            --success: #10b981;
            --dark: #1e293b; 
            --light-bg: #f8fafc; 
        }

        body { background-color: var(--light-bg); font-family: 'Poppins', sans-serif; margin: 0; }

        .form-container { max-width: 1100px; margin: 80px auto 30px auto; padding: 0 15px; }
        .wizard-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: grid; grid-template-columns: 280px 1fr; overflow: hidden; min-height: 600px; }

        .wizard-sidebar { background: var(--dark); color: white; padding: 40px 30px; }
        .step-item { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; opacity: 0.4; }
        .step-item.active { opacity: 1; color: #818cf8; font-weight: 700; }
        .step-num { width: 30px; height: 30px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        .wizard-content { padding: 40px; position: relative; width: 100%; box-sizing: border-box; overflow-x: hidden; }
        .step-content { display: none; animation: fadeIn 0.4s ease; }
        .step-content.active { display: block; }

        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #475569; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; box-sizing: border-box; font-family: inherit; }

        /* --- TABLE SYSTEM FIXES --- */
        .category-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .table-title { display: block; font-weight: 700; color: var(--primary); margin-bottom: 10px; }

        .table-responsive {
            width: 100%;
            overflow-x: auto; 
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            -webkit-overflow-scrolling: touch;
            background: #ffffff;
        }

        .cutoff-table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }

        /* १. पहिला कॉलम (प्रवर्ग) - FIXED SIZE & STICKY */
        .cutoff-table th:first-child,
        .cutoff-table td:first-child {
            position: sticky;
            left: 0; 
            width: 130px !important; 
            min-width: 130px !important;
            max-width: 130px !important;
            z-index: 25; 
            background-color: #f8fafc !important; /* तिन्ही टेबलमध्ये सेम कलर */
            border-right: 2px solid #cbd5e1;
            text-align: left;
            padding-left: 12px;
            font-weight: 800;
            color: #1e293b;
        }

        /* २. हेडर्स कलर्स - तिन्ही टेबलसाठी सेम */
        /* पहिली ओळ (General, Ladies, etc.) */
        .cutoff-table thead tr:first-child th {
            background-color: #4f46e5 !important; 
            color: white !important;
            z-index: 10;
        }

        /* कोपऱ्यातला मुख्य 'प्रवर्ग' सेल - GHOSTING FIX */
        .cutoff-table thead tr:first-child th:first-child {
            z-index: 50 !important; 
            background-color: #3730a3 !important; 
        }

        /* दुसरी ओळ (% आणि Rank) */
        .cutoff-table thead tr:nth-child(2) th,
        .cutoff-table thead tr th[colspan="1"],
        .cutoff-table thead tr th:not([colspan]) { 
            background-color: #e0e7ff !important; 
            color: #4338ca !important;
            font-weight: 700;
            z-index: 5;
        }

        .cutoff-table th, .cutoff-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #e2e8f0;
            border-right: 1px solid #f1f5f9;
            font-size: 0.8rem;
            white-space: nowrap; 
        }

        .cutoff-table td { background-color: #ffffff; }

        .cutoff-table input {
            width: 60px !important;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.75rem;
            text-align: center;
        }

        /* Footer & Nav */
        .btn-footer { margin-top: 30px; display: flex; justify-content: space-between; position: relative; z-index: 100; padding: 10px 0; background: #fff; }
        .btn-nav { padding: 12px 25px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-next { background: var(--primary); color: white; margin-left: auto; }
        .btn-prev { background: #f1f5f9; color: #475569; }

        @media (max-width: 768px) {
            .wizard-card { grid-template-columns: 1fr; }
            .wizard-sidebar { display: none; }
            .input-grid { grid-template-columns: 1fr; }
            .wizard-content { padding: 20px; }
            .cutoff-table { min-width: 850px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="wizard-card">
        <div class="wizard-sidebar">
            <div class="step-item active"><div class="step-num">1</div> ओळख & ब्रांचेस</div>
            <div class="step-item"><div class="step-num">2</div> कट-ऑफ</div>
            <div class="step-item"><div class="step-num">3</div> प्लेसमेंट</div>
            <div class="step-item"><div class="step-num">4</div> फी</div>
            <div class="step-item"><div class="step-num">5</div> संपर्क</div>
            <div class="step-item"><div class="step-num">6</div> प्रिव्ह्यू</div>
        </div>

        <div class="wizard-content">
            <form id="collegeMasterForm">
                
                <div class="step-content active">
                    <h2><i class="fas fa-university"></i> १. कॉलेजची ओळख</h2>
                    <div class="form-group"><label>कॉलेजचे पूर्ण नाव</label><input type="text" id="cName" placeholder="उदा. COEP Pune"></div>
                    <div class="input-grid">
                        <div class="form-group"><label>DTE कोड</label><input type="text" id="cCode"></div>
                        <div class="form-group">
                            <label>युनिव्हर्सिटी</label>
                            <select id="cUni" onchange="toggleOtherUni()">
                                <option value="">-- विद्यापीठ निवडा --</option>
                                <option value="SPPU">SPPU (पुणे)</option>
                                <option value="MU">MU (मुंबई)</option>
                                <option value="DBATU">DBATU</option>
                                <option value="Other">इतर</option>
                            </select>
                        </div>
                        <div class="form-group"><label>प्रकार</label><select id="cType"><option>Government</option><option>Private</option></select></div>
                    </div>
                </div>

                <div class="step-content">
                    <h2><i class="fas fa-chart-line"></i> २. प्रवर्गानुसार कट-ऑफ आणि रँक</h2>
                    
                    <div class="category-card">
                        <label class="table-title">टेबल १: मुख्य प्रवर्ग</label>
                        <div class="table-responsive">
                            <table class="cutoff-table">
                                <thead>
                                    <tr>
                                        <th rowspan="2">प्रवर्ग</th>
                                        <th colspan="2">General</th><th colspan="2">Ladies</th><th colspan="2">PWD</th>
                                    </tr>
                                    <tr>
                                        <th>%</th><th>Rank</th><th>%</th><th>Rank</th><th>%</th><th>Rank</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td class="cat-name">Open</td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td></tr>
                                    <tr><td class="cat-name">OBC</td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="category-card">
                        <label class="table-title">टेबल २: VJ / NT प्रवर्ग</label>
                        <div class="table-responsive">
                            <table class="cutoff-table">
                                <thead>
                                    <tr>
                                        <th rowspan="2">प्रवर्ग</th>
                                        <th colspan="2">General</th><th colspan="2">Ladies</th>
                                    </tr>
                                    <tr>
                                        <th>%</th><th>Rank</th><th>%</th><th>Rank</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr><td class="cat-name">VJ / DT (A)</td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td></tr>
                                    <tr><td class="cat-name">NT-B (NT-1)</td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td><td><input type="number"></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="category-card">
                        <label class="table-title">टेबल ३: विशेष प्रवर्ग</label>
                        <div class="table-responsive">
                            <table class="cutoff-table">
                                <thead>
                                    <tr><th>प्रवर्ग</th><th>Cut-off (%)</th><th>Rank</th></tr>
                                </thead>
                                <tbody>
                                    <tr><td class="cat-name">SBC</td><td><input type="number"></td><td><input type="number"></td></tr>
                                    <tr><td class="cat-name">EWS</td><td><input type="number"></td><td><input type="number"></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="btn-footer">
                    <button type="button" class="btn-nav btn-prev" id="prevBtn" onclick="changeStep(-1)" style="display:none;"><i class="fas fa-arrow-left"></i> मागे</button>
                    <button type="button" class="btn-nav btn-next" id="nextBtn" onclick="changeStep(1)">पुढची पायरी <i class="fas fa-arrow-right"></i></button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    let currentStep = 0;
    const steps = document.querySelectorAll(".step-content");
    const stepItems = document.querySelectorAll(".step-item");

    function showStep(n) {
        steps.forEach((s, i) => {
            s.classList.toggle("active", i === n);
            if(stepItems[i]) stepItems[i].classList.toggle("active", i === n);
        });
        document.getElementById("prevBtn").style.display = (n === 0) ? "none" : "flex";
    }

    function changeStep(n) {
        currentStep += n;
        showStep(currentStep);
        window.scrollTo(0,0);
    }
</script>
</body>
                                    </html>
