<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Entry | Edulizer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #4f46e5; --bg-color: #f8fafc; --dark-blue: #1e293b; }
        body { background-color: var(--bg-color); font-family: 'Poppins', sans-serif; margin: 0; color: #1e293b; }
        .form-container { max-width: 1100px; margin: 100px auto 30px auto; padding: 0 15px; }
        .wizard-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); display: grid; grid-template-columns: 280px 1fr; overflow: hidden; min-height: 650px; }
        .wizard-sidebar { background: var(--dark-blue); color: white; padding: 40px 30px; }
        .step-item { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; opacity: 0.4; transition: 0.3s; }
        .step-item.active { opacity: 1; color: #818cf8; font-weight: 700; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .wizard-content { padding: 40px; position: relative; }
        .step-content { display: none; animation: slideIn 0.4s ease; }
        .step-content.active { display: block; }
        h2 { color: var(--dark-blue); margin-bottom: 25px; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; height: 75px; display: flex; align-items: center; }
        .nav-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; }
        .logo-brand { display: flex; align-items: center; gap: 12px; font-size: 1.6rem; font-weight: 900; color: var(--primary-color); text-decoration: none; }
        .back-link { text-decoration: none; display: flex; align-items: center; gap: 8px; background: #f1f5f9; color: #475569; padding: 10px 20px; border-radius: 12px; font-weight: 700; font-size: 0.9rem; transition: 0.3s ease; }
        .user-profile-nav { display: flex; align-items: center; gap: 15px; padding-left: 20px; border-left: 2px solid #f1f5f9; }
        .user-avatar { width: 42px; height: 42px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.95rem; transition: 0.3s; font-family: inherit; }
        .cutoff-header { display: grid; grid-template-columns: 120px 1fr 1fr 1fr; gap: 10px; background: var(--dark-blue); color: white; padding: 12px; border-radius: 10px; font-size: 0.8rem; text-align: center; font-weight: 600; }
        .cutoff-grid { display: grid; grid-template-columns: 120px 1fr 1fr 1fr; gap: 15px; align-items: center; padding: 15px 0; border-bottom: 1px solid #e2e8f0; }
        .cat-title { font-weight: 800; color: var(--primary-color); }
        .input-pair { display: flex; gap: 5px; }
        .input-pair input { width: 50% !important; padding: 8px !important; text-align: center; }
        .section-divider { margin: 30px 0 15px 0; padding: 10px; background: #f1f5f9; border-left: 5px solid var(--primary-color); font-weight: 700; }
        .others-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .upload-container { border: 2px dashed #cbd5e1; padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; background: #fcfcfd; }
        .btn-footer { margin-top: 40px; display: flex; justify-content: space-between; }
        .btn-nav { padding: 12px 30px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .btn-next { background: var(--primary-color); color: white; margin-left: auto; }
        .btn-prev { background: #f1f5f9; color: #475569; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        @media (max-width: 850px) { .wizard-card { grid-template-columns: 1fr; } .wizard-sidebar { display: none; } .cutoff-header { display: none; } .cutoff-grid { grid-template-columns: 1fr; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; } }
    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-container">
        <a href="dashboard.html" class="logo-brand"><i class="fas fa-bolt"></i><span>Edulizer</span></a>
        <div class="nav-right">
            <a href="dashboard.html" class="back-link"><i class="fas fa-th-large"></i><span>डॅशबोर्डवर परत जा</span></a>
            <div class="user-profile-nav"><div class="user-avatar">V</div></div>
        </div>
    </div>
</nav>

<div class="form-container">
    <div class="wizard-card">
        <div class="wizard-sidebar">
            <div class="step-item active"><div class="step-num">1</div> ओळख</div>
            <div class="step-item"><div class="step-num">2</div> कट-ऑफ</div>
            <div class="step-item"><div class="step-num">3</div> प्लेसमेंट</div>
            <div class="step-item"><div class="step-num">4</div> फी</div>
            <div class="step-item"><div class="step-num">5</div> संपर्क</div>
            <div class="step-item"><div class="step-num">6</div> व्हॉल्ट</div>
        </div>

        <div class="wizard-content">
            <form id="collegeMasterForm">
                
                <div class="step-content active">
                    <h2><i class="fas fa-university" style="color: var(--primary-color);"></i> १. ओळख आणि फोटो</h2>
                    <div class="form-group"><label>कॉलेजचे पूर्ण नाव</label><input type="text" id="cName" required placeholder="उदा. College of Engineering, Pune"></div>
                    <div class="input-grid">
                        <div class="form-group"><label>DTE कोड</label><input type="number" id="cCode" placeholder="उदा. 6006"></div>
                        <div class="form-group">
                            <label>युनिव्हर्सिटी</label>
                            <select id="cUni" onchange="toggleOtherUni()">
                                <option value="">Select University...</option>
                                <option value="SPPU">SPPU (Pune)</option>
                                <option value="MU">MU (Mumbai)</option>
                                <option value="DBATU">DBATU (Lonere)</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="otherUniDiv" style="display: none;">
                        <label>इतर युनिव्हर्सिटीचे नाव</label><input type="text" id="cUniOther">
                    </div>
                    <div class="input-grid">
                        <div class="form-group"><label>Status</label><select id="cStatus"><option value="Govt">Government</option><option value="Private">Private</option></select></div>
                        <div class="form-group"><label>NAAC Grade</label><select id="cGrade"><option value="A++">A++</option><option value="A">A</option><option value="B">B</option></select></div>
                    </div>
                    <div class="form-group">
                        <label>कॉलेजचे फोटो</label>
                        <div class="upload-container" onclick="document.getElementById('cPhotos').click()">
                            <i class="fas fa-cloud-upload-alt"></i><p>फोटो निवडा</p>
                            <input type="file" id="cPhotos" multiple hidden accept="image/*">
                        </div>
                    </div>
                </div>

                <div class="step-content">
                    <h2><i class="fas fa-chart-line" style="color: #10b981;"></i> २. कॅटेगरी वाईज कट-ऑफ</h2>
                    <div class="cutoff-header"><div>Category</div><div>General</div><div>PWD</div><div>Defense</div></div>
                    <div class="cutoff-grid">
                        <div class="cat-title">Open</div>
                        <div class="input-pair"><input type="number" placeholder="R"><input type="text" placeholder="%"></div>
                        <div class="input-pair"><input type="number" placeholder="R"><input type="text" placeholder="%"></div>
                        <div class="input-pair"><input type="number" placeholder="R"><input type="text" placeholder="%"></div>
                    </div>
                    <div class="cutoff-grid">
                        <div class="cat-title">OBC</div>
                        <div class="input-pair"><input type="number" placeholder="R"><input type="text" placeholder="%"></div>
                        <div class="input-pair"><input type="number" placeholder="R"><input type="text" placeholder="%"></div>
                        <div class="input-pair"><input type="number" placeholder="R"><input type="text" placeholder="%"></div>
                    </div>
                    <h3 class="section-divider">Other Schemes</h3>
                    <div class="others-grid">
                        <div class="form-group"><label>EWS (10%)</label><div class="input-pair"><input type="number" id="ewsR"><input type="text" id="ewsP"></div></div>
                        <div class="form-group"><label>TFWS (5%)</label><div class="input-pair"><input type="number" id="tfwsR"><input type="text" id="tfwsP"></div></div>
                    </div>
                </div>

                <div class="step-content">
                    <h2><i class="fas fa-briefcase"></i> ३. प्लेसमेंट डेटा</h2>
                    <div id="placement-container">
                        <div class="placement-row" style="padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px;">
                            <div class="input-grid">
                                <div class="form-group"><label>वर्ष</label><select><option>2024</option><option>2023</option></select></div>
                                <div class="form-group"><label>Highest LPA</label><input type="number"></div>
                                <div class="form-group"><label>Average LPA</label><input type="number"></div>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="addYearBtn" onclick="addPlacementYear()" style="background:#10b981; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">+ वर्ष जोडा</button>
                </div>

                <div class="step-content">
                    <h2><i class="fas fa-wallet" style="color: #f59e0b;"></i> ४. फी आणि स्कॉलरशिप</h2>
                    <div class="input-grid">
                        <div class="form-group"><label>Open Fee</label><input type="number" id="feeOpen"></div>
                        <div class="form-group"><label>OBC/EBC Fee</label><input type="number" id="feeObc"></div>
                    </div>
                    <div class="form-group">
                        <label><input type="checkbox" id="hasHostel" onclick="toggleHostel()"> आमच्या कॉलेजला हॉस्टेल सुविधा आहे</label>
                    </div>
                    <div id="hostelDiv" style="display: none;" class="input-grid">
                        <div class="form-group"><label>Hostel Fee</label><input type="number" id="hostelFee"></div>
                        <div class="form-group"><label>Mess Fee</label><input type="number" id="messFee"></div>
                    </div>
                </div>

                <div class="step-content">
                    <h2><i class="fas fa-headset" style="color: #f59e0b;"></i> ५. संपर्क</h2>
                    <div class="input-grid">
                        <div class="form-group"><label>Phone</label><input type="tel" id="clgPhone"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="clgEmail"></div>
                    </div>
                    <div class="form-group"><label>Address</label><textarea id="clgAddr" rows="3"></textarea></div>
                </div>

                <div class="step-content">
                    <h2><i class="fas fa-vault" style="color: #6366f1;"></i> ६. व्हॉल्ट (Documents)</h2>
                    <div class="upload-container" onclick="document.getElementById('vaultDocs').click()">
                        <i class="fas fa-file-shield"></i><p>PDF किंवा कागदपत्रे निवडा</p>
                        <input type="file" id="vaultDocs" multiple hidden accept=".pdf">
                    </div>
                    <div id="vaultPreview" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                </div>

                <div class="btn-footer">
                    <button type="button" class="btn-nav btn-prev" id="prevBtn" onclick="changeStep(-1)" style="display: none;"><i class="fas fa-arrow-left"></i> मागे</button>
                    <button type="button" class="btn-nav btn-next" id="nextBtn" onclick="changeStep(1)">पुढची पायरी <i class="fas fa-arrow-right"></i></button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    let currentStep = 0;
    const steps = document.querySelectorAll(".step-content");
    const stepItems = document.querySelectorAll(".step-item");

    function showStep(n) {
        steps.forEach((step, index) => {
            step.style.display = (index === n) ? "block" : "none";
            stepItems[index].classList.toggle("active", index === n);
        });
        document.getElementById("prevBtn").style.display = (n === 0) ? "none" : "flex";
        const nextBtn = document.getElementById("nextBtn");
        nextBtn.innerHTML = (n === steps.length - 1) ? 'माहिती जतन करा <i class="fas fa-check"></i>' : 'पुढची पायरी <i class="fas fa-arrow-right"></i>';
        nextBtn.style.background = (n === steps.length - 1) ? "#10b981" : "#4f46e5";
    }

    function changeStep(n) {
        if (n === 1 && currentStep === steps.length - 1) {
            alert("डेटा सेव्ह झाला!");
            return;
        }
        currentStep += n;
        showStep(currentStep);
    }

    function toggleOtherUni() {
        const select = document.getElementById('cUni');
        document.getElementById('otherUniDiv').style.display = (select.value === 'Other') ? 'block' : 'none';
    }

    function toggleHostel() {
        document.getElementById('hostelDiv').style.display = document.getElementById('hasHostel').checked ? 'grid' : 'none';
    }

    function addPlacementYear() {
        const container = document.getElementById('placement-container');
        const row = document.querySelector('.placement-row').cloneNode(true);
        row.querySelectorAll('input').forEach(i => i.value = "");
        container.appendChild(row);
    }

    document.getElementById('vaultDocs').addEventListener('change', function() {
        const preview = document.getElementById('vaultPreview');
        preview.innerHTML = "";
        Array.from(this.files).forEach(file => {
            const div = document.createElement('div');
            div.style = "background:#f1f5f9; padding:10px; border-radius:8px; font-size:0.8rem; display:flex; align-items:center; gap:5px;";
            div.innerHTML = `<i class="fas fa-file-pdf" style="color:red"></i> ${file.name}`;
            preview.appendChild(div);
        });
    });

    document.addEventListener("DOMContentLoaded", () => showStep(currentStep));
</script>
</body>
</html>
