<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Entry | Edulizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4f46e5;
            --bg-color: #f8fafc;
        }

        body { background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .form-container { max-width: 1000px; margin: 30px auto; padding: 0 15px; }

        .wizard-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: 280px 1fr;
            overflow: hidden;
            min-height: 600px;
        }

        /* Sidebar Steps */
        .wizard-sidebar { background: #1e293b; color: white; padding: 40px 30px; }
        .step-item { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; opacity: 0.4; transition: 0.3s; }
        .step-item.active { opacity: 1; color: #818cf8; font-weight: 700; }
        .step-num { 
            width: 32px; height: 32px; border-radius: 50%; border: 2px solid currentColor; 
            display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
        }

        /* Content Area */
        .wizard-content { padding: 40px; position: relative; }
        .step-content { display: none; animation: slideIn 0.4s ease; }
        .step-content.active { display: block; }

        h2 { color: #1e293b; margin-bottom: 25px; font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }

        /* Form Controls */
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; font-size: 0.9rem; }
        .form-group input, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* Photo Upload UI */
        .upload-container {
            border: 2px dashed #cbd5e1;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            background: #fcfcfd;
            transition: 0.3s;
        }
        .upload-container:hover { border-color: var(--primary-color); background: #f5f3ff; }
        .upload-container i { font-size: 2.5rem; color: var(--primary-color); margin-bottom: 10px; }

        /* Navigation Buttons */
        .btn-footer { 
            margin-top: 40px; padding-top: 25px; border-top: 1px solid #f1f5f9; 
            display: flex; justify-content: space-between; 
        }
        .btn-nav { padding: 12px 30px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn-next { background: var(--primary-color); color: white; }
        .btn-next:hover { background: #4338ca; }
        .btn-prev { background: #f1f5f9; color: #475569; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 850px) {
            .wizard-card { grid-template-columns: 1fr; }
            .wizard-sidebar { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <i class="fas fa-bars" id="menu-btn"></i>
            <div class="logo" style="font-weight: 800; color: #4f46e5; font-size: 1.5rem;">
                <i class="fas fa-bolt"></i> Edulizer
            </div>
        </div>
        <div class="nav-right">
            <div class="user-info-nav">
                <small>Researcher</small>
                <span id="navUserName">Loading...</span>
            </div>
            <button onclick="window.location.href='dashboard.html'" class="btn-logout-red" style="background: #64748b; padding: 8px 15px; font-size: 0.8rem;">
                <i class="fas fa-arrow-left"></i> डॅशबोर्ड
            </button>
        </div>
    </nav>

    <div class="form-container">
        <div class="wizard-card">
            
            <div class="wizard-sidebar">
                <div class="step-item active" id="s1"><div class="step-num">1</div> ओळख (Identity)</div>
                <div class="step-item" id="s2"><div class="step-num">2</div> कट-ऑफ (Cut-off)</div>
                <div class="step-item" id="s3"><div class="step-num">3</div> प्लेसमेंट (Placement)</div>
                <div class="step-item" id="s4"><div class="step-num">4</div> फी (Financials)</div>
                <div class="step-item" id="s5"><div class="step-num">5</div> संपर्क (Contact)</div>
                <div class="step-item" id="s6"><div class="step-num">6</div> व्हॉल्ट (Vault)</div>
            </div>

            <div class="wizard-content">
                <form id="collegeMasterForm">
                    
                    <div class="step-content active" id="step1">
                        <h2><i class="fas fa-university" style="color: var(--primary-color);"></i> १. ओळख आणि फोटो</h2>
                        
                        <div class="form-group">
                            <label>कॉलेजचे पूर्ण नाव</label>
                            <input type="text" id="cName" placeholder="उदा. College of Engineering, Pune" required>
                        </div>

                        <div class="input-grid">
                            <div class="form-group">
                                <label>DTE कोड</label>
                                <input type="number" id="cCode" placeholder="उदा. 6006">
                            </div>
                            <div class="form-group">
                                <label>युनिव्हर्सिटी</label>
                                <select id="cUni" onchange="checkUniversity(this.value)">
                                    <option value="">निवडा...</option>
                                    <option value="SPPU">SPPU (Pune University)</option>
                                    <option value="MU">MU (Mumbai University)</option>
                                    <option value="BATU">DBATU (Lonere - Technical)</option>
                                    <option value="SUK">SUK (Shivaji University, Kolhapur)</option>
                                    <option value="SGBU">SGBU (Amravati University)</option>
                                    <option value="NMU">KBCNMU (Jalgaon University)</option>
                                    <option value="BAMU">Dr. BAMU (Aurangabad)</option>
                                    <option value="SRTMU">SRTMU (Nanded)</option>
                                    <option value="Other">इतर (इथे नाव लिहा...)</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group" id="otherUniDiv" style="display: none; animation: fadeIn 0.3s;">
                            <label>इतर युनिव्हर्सिटीचे नाव सांगा</label>
                            <input type="text" id="cUniOther" placeholder="युनिव्हर्सिटीचे पूर्ण नाव लिहा">
                        </div>

                        <div class="input-grid">
                            <div class="form-group">
                                <label>Status (प्रकार)</label>
                                <select id="cStatus">
                                    <option value="Govt">Government</option>
                                    <option value="Private">Private</option>
                                    <option value="Aided">Aided (अनुदानित)</option>
                                    <option value="Deemed">Deemed University</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Autonomy (स्वायत्तता)</label>
                                <select id="cAuto">
                                    <option value="Autonomous">Autonomous</option>
                                    <option value="Non-Autonomous">Non-Autonomous</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>NAAC Grade</label>
                                <select id="cGrade">
                                    <option value="A++">A++</option>
                                    <option value="A+">A+</option>
                                    <option value="A">A</option>
                                    <option value="B++">B++</option>
                                    <option value="B+">B+</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="Not Accredited">अद्याप मिळालेला नाही</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>कॉलेजचे फोटो (कॅम्पस, गेट इ.)</label>
                            <div class="upload-container" onclick="document.getElementById('cPhotos').click()">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <p>फोटो निवडण्यासाठी क्लिक करा</p>
                                <input type="file" id="cPhotos" multiple hidden accept="image/*">
                            </div>
                            <div id="photoPreview" style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;"></div>
                        </div>
                    </div>

                    <div class="step-content" id="step2">
                        </div>

                    <div class="step-content" id="step3">
                        </div>

                    <div class="step-content" id="step4"></div>
                    <div class="step-content" id="step5"></div>
                    <div class="step-content" id="step6"></div>

                    <div class="btn-footer">
                        <button type="button" class="btn-nav btn-prev" id="prevBtn" onclick="moveStep(-1)" style="display: none;">मागे</button>
                        <button type="button" class="btn-nav btn-next" id="nextBtn" onclick="moveStep(1)">पुढची पायरी</button>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 0;
        const tabs = document.getElementsByClassName("step-content");
        const steps = document.getElementsByClassName("step-item");

        function moveStep(n) {
            // सध्याचा टॅब लपवा
            tabs[currentTab].style.display = "none";
            steps[currentTab].classList.remove("active");

            currentTab = currentTab + n;

            // शेवटची पायरी आहे का चेक करा
            if (currentTab >= tabs.length) {
                alert("माहिती यशस्वीरित्या सेव्ह झाली!");
                window.location.href = 'dashboard.html';
                return false;
            }

            showTab(currentTab);
        }

        function showTab(n) {
            tabs[n].style.display = "block";
            steps[n].classList.add("active");

            // Buttons कंट्रोल
            document.getElementById("prevBtn").style.display = (n == 0) ? "none" : "inline";
            document.getElementById("nextBtn").innerHTML = (n == (tabs.length - 1)) ? "माहिती जतन करा" : "पुढची पायरी";
        }

        // फोटो प्रिव्ह्यू लॉजिक
        document.getElementById('cPhotos').addEventListener('change', function(e) {
            const preview = document.getElementById('photoPreview');
            preview.innerHTML = "";
            Array.from(this.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style = "width: 80px; height: 60px; object-fit: cover; border-radius: 8px; border: 2px solid #e2e8f0;";
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            });
        });
    </script>

</body>
</html>
